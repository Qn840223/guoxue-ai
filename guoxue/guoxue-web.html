<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国学AI助手 - 网页版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .config-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .config-box h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .help-text {
            font-size: 13px;
            color: #999;
            margin-top: 5px;
        }
        
        .help-text a {
            color: #667eea;
            text-decoration: none;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            background: none;
            color: #666;
            font-size: 16px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab:hover {
            color: #667eea;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-box {
            margin-bottom: 20px;
        }
        
        .input-box label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .input-box input,
        .input-box select,
        .input-box textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .input-box textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 500;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-box {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            white-space: pre-wrap;
            line-height: 1.8;
            border-left: 4px solid #667eea;
        }
        
        .result-box strong {
            color: #667eea;
        }
        
        .error-box {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            margin: 30px 0;
            font-size: 16px;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        .example-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .example-btn {
            background: #f0f0f0;
            border: 1px solid #ddd;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 国学AI助手</h1>
            <p>传承中华文化，让国学学习更简单</p>
        </div>

        <div class="config-box">
            <h3>⚙️ API配置</h3>
            <div class="form-group">
                <label>API密钥：</label>
                <input type="password" id="apiKey" value="sk-xjlzds0424" placeholder="请输入你的API密钥" />
                <div class="help-text">
                    ✅ 已配置专属API密钥（无限调用）
                </div>
            </div>
            <div class="form-group">
                <label>API服务：</label>
                <select id="apiBase">
                    <option value="http://43.139.203.146:8050/v1" selected>专属服务器（推荐）</option>
                    <option value="https://interialaiapi.xiaojiaixhs.com/v1">备用服务器</option>
                    <option value="https://api.deepseek.com/v1">DeepSeek官方</option>
                    <option value="https://api.openai.com/v1">OpenAI</option>
                </select>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('translation')">📖 古文翻译</button>
            <button class="tab" onclick="switchTab('poetry')">✍️ 诗词创作</button>
            <button class="tab" onclick="switchTab('couplet')">🎋 对联生成</button>
            <button class="tab" onclick="switchTab('query')">🔍 典故查询</button>
            <button class="tab" onclick="switchTab('punctuation')">📝 智能断句</button>
            <button class="tab" onclick="switchTab('chat')">💬 智能问答</button>
        </div>

        <!-- 古文翻译 -->
        <div id="translation" class="tab-content active">
            <div class="input-box">
                <label>输入古文：</label>
                <textarea id="translationInput" placeholder="例如：学而时习之，不亦说乎"></textarea>
                <div class="example-buttons">
                    <button class="example-btn" onclick="setExample('translationInput', '学而时习之，不亦说乎')">示例1</button>
                    <button class="example-btn" onclick="setExample('translationInput', '有朋自远方来，不亦乐乎')">示例2</button>
                    <button class="example-btn" onclick="setExample('translationInput', '温故而知新，可以为师矣')">示例3</button>
                </div>
            </div>
            <button class="btn" onclick="translate()">开始翻译</button>
            <div id="translationResult"></div>
        </div>

        <!-- 诗词创作 -->
        <div id="poetry" class="tab-content">
            <div class="input-box">
                <label>主题：</label>
                <input type="text" id="poetryTheme" placeholder="例如：春天、思乡、友情" />
            </div>
            <div class="input-box">
                <label>格式：</label>
                <select id="poetryStyle">
                    <option>七言绝句</option>
                    <option>五言绝句</option>
                    <option>七言律诗</option>
                    <option>五言律诗</option>
                </select>
            </div>
            <button class="btn" onclick="createPoetry()">开始创作</button>
            <div id="poetryResult"></div>
        </div>

        <!-- 对联生成 -->
        <div id="couplet" class="tab-content">
            <div class="input-box">
                <label>上联：</label>
                <input type="text" id="coupletInput" placeholder="例如：春回大地千山秀" />
                <div class="example-buttons">
                    <button class="example-btn" onclick="setExample('coupletInput', '春回大地千山秀')">示例1</button>
                    <button class="example-btn" onclick="setExample('coupletInput', '风声雨声读书声声声入耳')">示例2</button>
                    <button class="example-btn" onclick="setExample('coupletInput', '天增岁月人增寿')">示例3</button>
                </div>
            </div>
            <button class="btn" onclick="createCouplet()">生成下联</button>
            <div id="coupletResult"></div>
        </div>

        <!-- 典故查询 -->
        <div id="query" class="tab-content">
            <div class="input-box">
                <label>关键词：</label>
                <input type="text" id="queryInput" placeholder="例如：卧薪尝胆、孔子、赤壁之战" />
            </div>
            <div class="input-box">
                <label>类型：</label>
                <select id="queryType">
                    <option value="allusion">典故</option>
                    <option value="person">历史人物</option>
                    <option value="event">历史事件</option>
                </select>
            </div>
            <button class="btn" onclick="queryAllusion()">开始查询</button>
            <div id="queryResult"></div>
        </div>

        <!-- 智能断句 -->
        <div id="punctuation" class="tab-content">
            <div class="input-box">
                <label>输入无标点古文：</label>
                <textarea id="punctuationInput" placeholder="例如：子曰学而时习之不亦说乎有朋自远方来不亦乐乎"></textarea>
            </div>
            <button class="btn" onclick="addPunctuation()">开始断句</button>
            <div id="punctuationResult"></div>
        </div>

        <!-- 智能问答 -->
        <div id="chat" class="tab-content">
            <div id="chatMessages" style="max-height: 400px; overflow-y: auto; margin-bottom: 20px;"></div>
            <div class="input-box">
                <label>输入问题：</label>
                <textarea id="chatInput" rows="3" placeholder="例如：孔子的教育思想是什么？"></textarea>
                <div class="example-buttons">
                    <button class="example-btn" onclick="setExample('chatInput', '《论语》中有哪些关于学习的名言？')">示例1</button>
                    <button class="example-btn" onclick="setExample('chatInput', '请解释一下"仁义礼智信"的含义')">示例2</button>
                    <button class="example-btn" onclick="setExample('chatInput', '唐诗和宋词有什么区别？')">示例3</button>
                </div>
            </div>
            <button class="btn" onclick="chat()">发送</button>
        </div>

        <div class="footer">
            <p>📚 传承中华文化，让国学学习更简单</p>
            <p style="margin-top: 10px;">Made with ❤️ for Chinese Culture</p>
        </div>
    </div>

    <script>
        let chatHistory = [];

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function setExample(inputId, text) {
            document.getElementById(inputId).value = text;
        }

        async function callAI(messages, temperature = 0.7) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const apiBase = document.getElementById('apiBase').value;

            if (!apiKey) {
                throw new Error('请先在上方配置API密钥');
            }

            const modelMap = {
                'https://api.deepseek.com/v1': 'deepseek-chat',
                'https://api.openai.com/v1': 'gpt-4',
                'https://dashscope.aliyuncs.com/compatible-mode/v1': 'qwen-plus'
            };

            const response = await fetch(`${apiBase}/chat/completions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: modelMap[apiBase] || 'deepseek-chat',
                    messages,
                    temperature
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || `调用失败 (${response.status})`);
            }

            const data = await response.json();
            return data.choices[0].message.content;
        }

        async function translate() {
            const input = document.getElementById('translationInput').value.trim();
            const resultDiv = document.getElementById('translationResult');
            
            if (!input) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请输入古文</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">翻译中，请稍候</div>';

            try {
                const messages = [
                    { role: 'system', content: '你是一位精通古汉语的国学专家。请将文言文翻译成现代汉语，要求准确、流畅、保留文学美感。' },
                    { role: 'user', content: `请翻译：${input}` }
                ];
                const result = await callAI(messages);
                resultDiv.innerHTML = `<div class="result-box"><strong>原文：</strong><br/>${input}<br/><br/><strong>译文：</strong><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function createPoetry() {
            const theme = document.getElementById('poetryTheme').value.trim();
            const style = document.getElementById('poetryStyle').value;
            const resultDiv = document.getElementById('poetryResult');
            
            if (!theme) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请输入主题</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">创作中，请稍候</div>';

            try {
                const messages = [
                    { role: 'system', content: `你是一位才华横溢的古代诗人。请创作一首${style}，严格遵守格律规则，意境优美，用词典雅。` },
                    { role: 'user', content: `主题：${theme}` }
                ];
                const result = await callAI(messages, 0.9);
                resultDiv.innerHTML = `<div class="result-box"><strong>《${theme}》</strong><br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function createCouplet() {
            const input = document.getElementById('coupletInput').value.trim();
            const resultDiv = document.getElementById('coupletResult');
            
            if (!input) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请输入上联</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">生成中，请稍候</div>';

            try {
                const messages = [
                    { role: 'system', content: '你是一位精通对联创作的专家。请根据上联创作对仗工整的下联，并提供横批。格式：下联：xxx\\n横批：xxx' },
                    { role: 'user', content: `上联：${input}` }
                ];
                const result = await callAI(messages, 0.8);
                resultDiv.innerHTML = `<div class="result-box"><strong>上联：</strong>${input}<br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function queryAllusion() {
            const input = document.getElementById('queryInput').value.trim();
            const type = document.getElementById('queryType').value;
            const resultDiv = document.getElementById('queryResult');
            
            if (!input) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请输入关键词</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">查询中，请稍候</div>';

            try {
                const typeMap = { allusion: '典故', person: '历史人物', event: '历史事件' };
                const messages = [
                    { role: 'system', content: `你是一位博学的国学专家。请详细解释${typeMap[type]}，包括出处、含义、背景和相关故事。` },
                    { role: 'user', content: `请解释：${input}` }
                ];
                const result = await callAI(messages);
                resultDiv.innerHTML = `<div class="result-box"><strong>${input}</strong><br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function addPunctuation() {
            const input = document.getElementById('punctuationInput').value.trim();
            const resultDiv = document.getElementById('punctuationResult');
            
            if (!input) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请输入古文</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">断句中，请稍候</div>';

            try {
                const messages = [
                    { role: 'system', content: '你是一位精通古汉语的专家。请为无标点古文添加正确的标点符号。只返回添加标点后的文本，不要其他说明。' },
                    { role: 'user', content: input }
                ];
                const result = await callAI(messages);
                resultDiv.innerHTML = `<div class="result-box"><strong>原文：</strong><br/>${input}<br/><br/><strong>断句后：</strong><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function chat() {
            const input = document.getElementById('chatInput').value.trim();
            const messagesDiv = document.getElementById('chatMessages');
            
            if (!input) {
                return;
            }

            // 添加用户消息
            chatHistory.push({ role: 'user', content: input });
            messagesDiv.innerHTML += `<div class="result-box" style="background: #e3f2fd;"><strong>你：</strong><br/>${input}</div>`;
            document.getElementById('chatInput').value = '';

            // 显示加载状态
            messagesDiv.innerHTML += '<div class="loading" id="chatLoading">AI思考中</div>';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const systemPrompt = { 
                    role: 'system', 
                    content: '你是一位博学的国学专家和教师。你精通中国古代文学、历史、哲学和文化。请用通俗易懂的语言回答用户关于国学的问题。' 
                };
                const messages = [systemPrompt, ...chatHistory];
                const result = await callAI(messages);
                
                // 移除加载状态
                document.getElementById('chatLoading').remove();
                
                // 添加AI回复
                chatHistory.push({ role: 'assistant', content: result });
                messagesDiv.innerHTML += `<div class="result-box"><strong>AI：</strong><br/>${result}</div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch (error) {
                document.getElementById('chatLoading').remove();
                messagesDiv.innerHTML += `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        // 回车发送
        document.getElementById('chatInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chat();
            }
        });
    </script>
</body>
</html>
