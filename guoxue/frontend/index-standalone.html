<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>国学AI助手 - 网页版</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      }
      h1 {
        text-align: center;
        color: #667eea;
        margin-bottom: 10px;
      }
      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
      }
      .config-section {
        background: #f5f5f5;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 30px;
      }
      .config-section h3 {
        margin-top: 0;
        color: #333;
      }
      .input-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        color: #555;
        font-weight: 500;
      }
      input, select, textarea {
        width: 100%;
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        box-sizing: border-box;
      }
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #667eea;
      }
      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s;
      }
      button:hover {
        transform: translateY(-2px);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .result {
        background: #f9f9f9;
        padding: 20px;
        border-radius: 10px;
        margin-top: 20px;
        white-space: pre-wrap;
        line-height: 1.8;
      }
      .error {
        background: #fee;
        color: #c33;
        padding: 15px;
        border-radius: 8px;
        margin-top: 20px;
      }
      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        border-bottom: 2px solid #eee;
      }
      .tab {
        padding: 10px 20px;
        cursor: pointer;
        border: none;
        background: none;
        color: #666;
        font-size: 16px;
        border-bottom: 3px solid transparent;
      }
      .tab.active {
        color: #667eea;
        border-bottom-color: #667eea;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .loading {
        text-align: center;
        color: #667eea;
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📚 国学AI助手</h1>
      <p class="subtitle">传承中华文化，让国学学习更简单</p>

      <div class="config-section">
        <h3>⚙️ API配置</h3>
        <div class="input-group">
          <label>API密钥：</label>
          <input type="password" id="apiKey" placeholder="请输入你的DeepSeek或OpenAI API密钥" />
        </div>
        <div class="input-group">
          <label>API地址：</label>
          <select id="apiBase">
            <option value="https://api.deepseek.com/v1">DeepSeek（推荐）</option>
            <option value="https://api.openai.com/v1">OpenAI</option>
            <option value="https://dashscope.aliyuncs.com/compatible-mode/v1">通义千问</option>
          </select>
        </div>
        <small style="color: #999;">💡 获取DeepSeek密钥：<a href="https://platform.deepseek.com" target="_blank">https://platform.deepseek.com</a></small>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('translation')">古文翻译</button>
        <button class="tab" onclick="switchTab('poetry')">诗词创作</button>
        <button class="tab" onclick="switchTab('couplet')">对联生成</button>
        <button class="tab" onclick="switchTab('query')">典故查询</button>
      </div>

      <div id="translation" class="tab-content active">
        <div class="input-group">
          <label>输入古文：</label>
          <textarea id="translationInput" rows="4" placeholder="例如：学而时习之，不亦说乎"></textarea>
        </div>
        <button onclick="translate()">开始翻译</button>
        <div id="translationResult"></div>
      </div>

      <div id="poetry" class="tab-content">
        <div class="input-group">
          <label>主题：</label>
          <input type="text" id="poetryTheme" placeholder="例如：春天、思乡" />
        </div>
        <div class="input-group">
          <label>格式：</label>
          <select id="poetryStyle">
            <option>七言绝句</option>
            <option>五言绝句</option>
            <option>七言律诗</option>
            <option>五言律诗</option>
          </select>
        </div>
        <button onclick="createPoetry()">开始创作</button>
        <div id="poetryResult"></div>
      </div>

      <div id="couplet" class="tab-content">
        <div class="input-group">
          <label>上联：</label>
          <input type="text" id="coupletInput" placeholder="例如：春回大地千山秀" />
        </div>
        <button onclick="createCouplet()">生成下联</button>
        <div id="coupletResult"></div>
      </div>

      <div id="query" class="tab-content">
        <div class="input-group">
          <label>关键词：</label>
          <input type="text" id="queryInput" placeholder="例如：卧薪尝胆" />
        </div>
        <div class="input-group">
          <label>类型：</label>
          <select id="queryType">
            <option value="allusion">典故</option>
            <option value="person">历史人物</option>
            <option value="event">历史事件</option>
          </select>
        </div>
        <button onclick="queryAllusion()">开始查询</button>
        <div id="queryResult"></div>
      </div>
    </div>

    <script>
      function switchTab(tabName) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
        event.target.classList.add('active')
        document.getElementById(tabName).classList.add('active')
      }

      async function callAI(messages, temperature = 0.7) {
        const apiKey = document.getElementById('apiKey').value
        const apiBase = document.getElementById('apiBase').value

        if (!apiKey) {
          throw new Error('请先配置API密钥')
        }

        const response = await fetch(`${apiBase}/chat/completions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: apiBase.includes('deepseek') ? 'deepseek-chat' : 'gpt-4',
            messages,
            temperature
          })
        })

        if (!response.ok) {
          const error = await response.json()
          throw new Error(error.error?.message || '调用失败')
        }

        const data = await response.json()
        return data.choices[0].message.content
      }

      async function translate() {
        const input = document.getElementById('translationInput').value
        const resultDiv = document.getElementById('translationResult')
        
        if (!input) {
          resultDiv.innerHTML = '<div class="error">请输入古文</div>'
          return
        }

        resultDiv.innerHTML = '<div class="loading">翻译中...</div>'

        try {
          const messages = [
            { role: 'system', content: '你是一位精通古汉语的国学专家。请将文言文翻译成现代汉语，要求准确、流畅、保留文学美感。' },
            { role: 'user', content: `请翻译：${input}` }
          ]
          const result = await callAI(messages)
          resultDiv.innerHTML = `<div class="result"><strong>原文：</strong><br/>${input}<br/><br/><strong>译文：</strong><br/>${result}</div>`
        } catch (error) {
          resultDiv.innerHTML = `<div class="error">错误：${error.message}</div>`
        }
      }

      async function createPoetry() {
        const theme = document.getElementById('poetryTheme').value
        const style = document.getElementById('poetryStyle').value
        const resultDiv = document.getElementById('poetryResult')
        
        if (!theme) {
          resultDiv.innerHTML = '<div class="error">请输入主题</div>'
          return
        }

        resultDiv.innerHTML = '<div class="loading">创作中...</div>'

        try {
          const messages = [
            { role: 'system', content: `你是一位才华横溢的古代诗人。请创作一首${style}，严格遵守格律规则，意境优美，用词典雅。` },
            { role: 'user', content: `主题：${theme}` }
          ]
          const result = await callAI(messages, 0.9)
          resultDiv.innerHTML = `<div class="result"><strong>《${theme}》</strong><br/><br/>${result}</div>`
        } catch (error) {
          resultDiv.innerHTML = `<div class="error">错误：${error.message}</div>`
        }
      }

      async function createCouplet() {
        const input = document.getElementById('coupletInput').value
        const resultDiv = document.getElementById('coupletResult')
        
        if (!input) {
          resultDiv.innerHTML = '<div class="error">请输入上联</div>'
          return
        }

        resultDiv.innerHTML = '<div class="loading">生成中...</div>'

        try {
          const messages = [
            { role: 'system', content: '你是一位精通对联创作的专家。请根据上联创作对仗工整的下联，并提供横批。格式：下联：xxx\\n横批：xxx' },
            { role: 'user', content: `上联：${input}` }
          ]
          const result = await callAI(messages, 0.8)
          resultDiv.innerHTML = `<div class="result"><strong>上联：</strong>${input}<br/><br/>${result}</div>`
        } catch (error) {
          resultDiv.innerHTML = `<div class="error">错误：${error.message}</div>`
        }
      }

      async function queryAllusion() {
        const input = document.getElementById('queryInput').value
        const type = document.getElementById('queryType').value
        const resultDiv = document.getElementById('queryResult')
        
        if (!input) {
          resultDiv.innerHTML = '<div class="error">请输入关键词</div>'
          return
        }

        resultDiv.innerHTML = '<div class="loading">查询中...</div>'

        try {
          const typeMap = { allusion: '典故', person: '历史人物', event: '历史事件' }
          const messages = [
            { role: 'system', content: `你是一位博学的国学专家。请详细解释${typeMap[type]}，包括出处、含义、背景和相关故事。` },
            { role: 'user', content: `请解释：${input}` }
          ]
          const result = await callAI(messages)
          resultDiv.innerHTML = `<div class="result"><strong>${input}</strong><br/><br/>${result}</div>`
        } catch (error) {
          resultDiv.innerHTML = `<div class="error">错误：${error.message}</div>`
        }
      }
    </script>
  </body>
</html>
