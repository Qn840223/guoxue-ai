<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄学AI助手 - 面相手相八字运势</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .config-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .config-box h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .help-text {
            font-size: 13px;
            color: #999;
            margin-top: 5px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            background: none;
            color: #666;
            font-size: 16px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab:hover {
            color: #667eea;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-box {
            margin-bottom: 20px;
        }
        
        .input-box label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .input-box input,
        .input-box select,
        .input-box textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .input-box textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .upload-box {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-box:hover {
            border-color: #667eea;
            background: #f9f9f9;
        }
        
        .upload-box input[type="file"] {
            display: none;
        }
        
        .upload-preview {
            max-width: 300px;
            max-height: 300px;
            margin: 20px auto;
            border-radius: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 500;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-box {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            white-space: pre-wrap;
            line-height: 1.8;
            border-left: 4px solid #667eea;
        }
        
        .result-box strong {
            color: #667eea;
        }
        
        .error-box {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            margin: 30px 0;
            font-size: 16px;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 玄学AI助手</h1>
            <p>面相、手相、八字、运势一站式服务</p>
        </div>

        <div class="config-box">
            <h3>⚙️ API配置</h3>
            <div class="form-group">
                <label>API密钥：</label>
                <input type="password" id="apiKey" value="sk-xjlzds0424" placeholder="请输入你的API密钥" />
                <div class="help-text">
                    ✅ 已配置专属API密钥（无限调用）
                </div>
            </div>
            <div class="form-group">
                <label>API服务：</label>
                <select id="apiBase">
                    <option value="https://interialaiapi.xiaojiaixhs.com/v1" selected>备用服务器（推荐）</option>
                    <option value="http://43.139.203.146:8050/v1">专属服务器</option>
                    <option value="https://api.deepseek.com/v1">DeepSeek官方</option>
                    <option value="https://api.openai.com/v1">OpenAI</option>
                </select>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('face')">👤 面相分析</button>
            <button class="tab" onclick="switchTab('palm')">🖐️ 手相解读</button>
            <button class="tab" onclick="switchTab('bazi')">📅 八字测算</button>
            <button class="tab" onclick="switchTab('fortune')">🌟 运势预测</button>
            <button class="tab" onclick="switchTab('name')">✍️ 姓名测算</button>
        </div>

        <!-- 面相分析 -->
        <div id="face" class="tab-content active">
            <div class="input-box">
                <label>上传面相照片：</label>
                <div class="upload-box" onclick="document.getElementById('faceImage').click()">
                    <input type="file" id="faceImage" accept="image/*" onchange="previewImage(this, 'facePreview')">
                    <p>📷 点击上传或拖拽照片到这里</p>
                    <p style="font-size: 12px; color: #999; margin-top: 10px;">支持 JPG、PNG 格式</p>
                </div>
                <img id="facePreview" class="upload-preview" style="display:none;">
            </div>
            <button class="btn" onclick="analyzeFace()">开始分析面相</button>
            <div id="faceResult"></div>
        </div>

        <!-- 手相解读 -->
        <div id="palm" class="tab-content">
            <div class="input-box">
                <label>上传手相照片：</label>
                <div class="upload-box" onclick="document.getElementById('palmImage').click()">
                    <input type="file" id="palmImage" accept="image/*" onchange="previewImage(this, 'palmPreview')">
                    <p>🖐️ 点击上传或拖拽照片到这里</p>
                    <p style="font-size: 12px; color: #999; margin-top: 10px;">请拍摄清晰的手掌照片</p>
                </div>
                <img id="palmPreview" class="upload-preview" style="display:none;">
            </div>
            <div class="input-box">
                <label>选择手掌：</label>
                <select id="palmHand">
                    <option value="left">左手</option>
                    <option value="right">右手</option>
                </select>
            </div>
            <button class="btn" onclick="analyzePalm()">开始解读手相</button>
            <div id="palmResult"></div>
        </div>

        <!-- 八字测算 -->
        <div id="bazi" class="tab-content">
            <div class="input-box">
                <label>出生日期：</label>
                <input type="date" id="birthDate" />
            </div>
            <div class="input-box">
                <label>出生时辰：</label>
                <select id="birthHour">
                    <option value="子时">子时 (23:00-01:00)</option>
                    <option value="丑时">丑时 (01:00-03:00)</option>
                    <option value="寅时">寅时 (03:00-05:00)</option>
                    <option value="卯时">卯时 (05:00-07:00)</option>
                    <option value="辰时">辰时 (07:00-09:00)</option>
                    <option value="巳时">巳时 (09:00-11:00)</option>
                    <option value="午时">午时 (11:00-13:00)</option>
                    <option value="未时">未时 (13:00-15:00)</option>
                    <option value="申时">申时 (15:00-17:00)</option>
                    <option value="酉时">酉时 (17:00-19:00)</option>
                    <option value="戌时">戌时 (19:00-21:00)</option>
                    <option value="亥时">亥时 (21:00-23:00)</option>
                </select>
            </div>
            <div class="input-box">
                <label>性别：</label>
                <select id="gender">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
            <button class="btn" onclick="analyzeBazi()">开始测算八字</button>
            <div id="baziResult"></div>
        </div>

        <!-- 运势预测 -->
        <div id="fortune" class="tab-content">
            <div class="input-box">
                <label>出生日期：</label>
                <input type="date" id="fortuneDate" />
            </div>
            <div class="input-box">
                <label>预测类型：</label>
                <select id="fortuneType">
                    <option value="今日运势">今日运势</option>
                    <option value="本周运势">本周运势</option>
                    <option value="本月运势">本月运势</option>
                    <option value="今年运势">今年运势</option>
                    <option value="事业运">事业运</option>
                    <option value="财运">财运</option>
                    <option value="感情运">感情运</option>
                    <option value="健康运">健康运</option>
                </select>
            </div>
            <button class="btn" onclick="predictFortune()">开始预测运势</button>
            <div id="fortuneResult"></div>
        </div>

        <!-- 姓名测算 -->
        <div id="name" class="tab-content">
            <div class="input-box">
                <label>姓名：</label>
                <input type="text" id="userName" placeholder="请输入姓名" />
            </div>
            <div class="input-box">
                <label>出生日期：</label>
                <input type="date" id="nameDate" />
            </div>
            <div class="input-box">
                <label>测算类型：</label>
                <select id="nameType">
                    <option value="姓名五格">姓名五格</option>
                    <option value="姓名三才">姓名三才</option>
                    <option value="姓名吉凶">姓名吉凶</option>
                    <option value="姓名配对">姓名配对</option>
                </select>
            </div>
            <button class="btn" onclick="analyzeName()">开始测算姓名</button>
            <div id="nameResult"></div>
        </div>

        <div class="footer">
            <p>🔮 仅供娱乐参考，请勿过度迷信</p>
            <p style="margin-top: 10px;">Made with ❤️ for Fortune Telling</p>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function callAI(messages, temperature = 0.7) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const apiBase = document.getElementById('apiBase').value;

            if (!apiKey) {
                throw new Error('请先在上方配置API密钥');
            }

            const modelMap = {
                'https://api.deepseek.com/v1': 'deepseek-chat',
                'https://api.openai.com/v1': 'gpt-4',
            };

            const response = await fetch(`${apiBase}/chat/completions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: modelMap[apiBase] || 'deepseek-chat',
                    messages,
                    temperature
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || `调用失败 (${response.status})`);
            }

            const data = await response.json();
            return data.choices[0].message.content;
        }

        async function analyzeFace() {
            const preview = document.getElementById('facePreview');
            const resultDiv = document.getElementById('faceResult');
            
            if (!preview.src) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请先上传面相照片</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">AI正在分析面相</div>';

            try {
                const messages = [
                    { role: 'system', content: '你是一位精通面相学的大师。请根据用户描述的面部特征，详细分析其性格、运势、事业、财运、感情等方面。分析要专业、详细、有说服力。' },
                    { role: 'user', content: '请帮我分析面相，包括：1.性格特点 2.事业运势 3.财运分析 4.感情婚姻 5.健康状况 6.未来发展建议' }
                ];
                const result = await callAI(messages, 0.8);
                resultDiv.innerHTML = `<div class="result-box"><strong>📊 面相分析结果：</strong><br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function analyzePalm() {
            const preview = document.getElementById('palmPreview');
            const hand = document.getElementById('palmHand').value;
            const resultDiv = document.getElementById('palmResult');
            
            if (!preview.src) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请先上传手相照片</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">AI正在解读手相</div>';

            try {
                const handText = hand === 'left' ? '左手' : '右手';
                const messages = [
                    { role: 'system', content: '你是一位精通手相学的大师。请根据用户的手掌特征，详细解读生命线、智慧线、感情线、事业线、财运线等，分析其命运、性格、运势。' },
                    { role: 'user', content: `请帮我解读${handText}手相，包括：1.生命线分析 2.智慧线解读 3.感情线特征 4.事业线走向 5.财运线状况 6.整体运势评价` }
                ];
                const result = await callAI(messages, 0.8);
                resultDiv.innerHTML = `<div class="result-box"><strong>🖐️ ${handText}手相解读：</strong><br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function analyzeBazi() {
            const birthDate = document.getElementById('birthDate').value;
            const birthHour = document.getElementById('birthHour').value;
            const gender = document.getElementById('gender').value;
            const resultDiv = document.getElementById('baziResult');
            
            if (!birthDate) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请选择出生日期</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">AI正在测算八字</div>';

            try {
                const messages = [
                    { role: 'system', content: '你是一位精通八字命理的大师。请根据用户的出生时间，详细分析其八字命盘、五行属性、十神关系、大运流年等，给出专业的命理解读。' },
                    { role: 'user', content: `请帮我测算八字：\n出生日期：${birthDate}\n出生时辰：${birthHour}\n性别：${gender}\n\n请分析：1.八字命盘 2.五行属性 3.性格特点 4.事业财运 5.婚姻感情 6.健康状况 7.大运流年 8.改运建议` }
                ];
                const result = await callAI(messages, 0.8);
                resultDiv.innerHTML = `<div class="result-box"><strong>📅 八字测算结果：</strong><br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function predictFortune() {
            const birthDate = document.getElementById('fortuneDate').value;
            const fortuneType = document.getElementById('fortuneType').value;
            const resultDiv = document.getElementById('fortuneResult');
            
            if (!birthDate) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请选择出生日期</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">AI正在预测运势</div>';

            try {
                const messages = [
                    { role: 'system', content: '你是一位精通命理运势的大师。请根据用户的出生日期和当前时间，详细预测其运势走向，包括幸运指数、注意事项、开运建议等。' },
                    { role: 'user', content: `请帮我预测${fortuneType}：\n出生日期：${birthDate}\n\n请包括：1.综合运势评分 2.幸运色彩和数字 3.吉凶方位 4.注意事项 5.开运建议 6.具体运势分析` }
                ];
                const result = await callAI(messages, 0.8);
                resultDiv.innerHTML = `<div class="result-box"><strong>🌟 ${fortuneType}预测：</strong><br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function analyzeName() {
            const userName = document.getElementById('userName').value.trim();
            const nameDate = document.getElementById('nameDate').value;
            const nameType = document.getElementById('nameType').value;
            const resultDiv = document.getElementById('nameResult');
            
            if (!userName) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请输入姓名</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">AI正在测算姓名</div>';

            try {
                const messages = [
                    { role: 'system', content: '你是一位精通姓名学的大师。请根据用户的姓名和出生日期，详细分析其姓名五格、三才配置、吉凶评价等，给出专业的姓名学解读。' },
                    { role: 'user', content: `请帮我测算姓名：\n姓名：${userName}\n出生日期：${nameDate || '未提供'}\n测算类型：${nameType}\n\n请分析：1.姓名笔画 2.五格数理 3.三才配置 4.吉凶评价 5.性格影响 6.运势影响 7.改名建议` }
                ];
                const result = await callAI(messages, 0.8);
                resultDiv.innerHTML = `<div class="result-box"><strong>✍️ ${nameType}结果：</strong><br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
