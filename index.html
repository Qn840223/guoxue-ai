<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄学AI助手 - 八字运势测算</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            background: none;
            color: #666;
            font-size: 16px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab:hover {
            color: #667eea;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-box {
            margin-bottom: 20px;
        }
        
        .input-box label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .input-box input,
        .input-box select,
        .input-box textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .input-box textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 500;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-box {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            white-space: pre-wrap;
            line-height: 1.8;
            border-left: 4px solid #667eea;
        }
        
        .result-box strong {
            color: #667eea;
        }
        
        .error-box {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            margin: 30px 0;
            font-size: 16px;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 14px;
        }

        .help-text {
            font-size: 13px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 玄学AI助手</h1>
            <p>八字、运势、姓名测算一站式服务</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('bazi')">📅 八字测算</button>
            <button class="tab" onclick="switchTab('fortune')">🌟 运势预测</button>
            <button class="tab" onclick="switchTab('name')">✍️ 姓名测算</button>
            <button class="tab" onclick="switchTab('character')">👤 性格分析</button>
        </div>

        <!-- 八字测算 -->
        <div id="bazi" class="tab-content active">
            <div class="input-box">
                <label>出生日期：</label>
                <input type="date" id="birthDate" />
            </div>
            <div class="input-box">
                <label>出生时辰：</label>
                <select id="birthHour">
                    <option value="子时">子时 (23:00-01:00)</option>
                    <option value="丑时">丑时 (01:00-03:00)</option>
                    <option value="寅时">寅时 (03:00-05:00)</option>
                    <option value="卯时">卯时 (05:00-07:00)</option>
                    <option value="辰时">辰时 (07:00-09:00)</option>
                    <option value="巳时">巳时 (09:00-11:00)</option>
                    <option value="午时">午时 (11:00-13:00)</option>
                    <option value="未时">未时 (13:00-15:00)</option>
                    <option value="申时">申时 (15:00-17:00)</option>
                    <option value="酉时">酉时 (17:00-19:00)</option>
                    <option value="戌时">戌时 (19:00-21:00)</option>
                    <option value="亥时">亥时 (21:00-23:00)</option>
                </select>
            </div>
            <div class="input-box">
                <label>性别：</label>
                <select id="gender">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
            <button class="btn" onclick="analyzeBazi()">开始测算八字</button>
            <div id="baziResult"></div>
        </div>

        <!-- 运势预测 -->
        <div id="fortune" class="tab-content">
            <div class="input-box">
                <label>出生日期：</label>
                <input type="date" id="fortuneDate" />
            </div>
            <div class="input-box">
                <label>预测类型：</label>
                <select id="fortuneType">
                    <option value="今日运势">今日运势</option>
                    <option value="本周运势">本周运势</option>
                    <option value="本月运势">本月运势</option>
                    <option value="今年运势">今年运势</option>
                    <option value="事业运">事业运</option>
                    <option value="财运">财运</option>
                    <option value="感情运">感情运</option>
                    <option value="健康运">健康运</option>
                </select>
            </div>
            <button class="btn" onclick="predictFortune()">开始预测运势</button>
            <div id="fortuneResult"></div>
        </div>

        <!-- 姓名测算 -->
        <div id="name" class="tab-content">
            <div class="input-box">
                <label>姓名：</label>
                <input type="text" id="userName" placeholder="请输入姓名" />
            </div>
            <div class="input-box">
                <label>出生日期：</label>
                <input type="date" id="nameDate" />
            </div>
            <div class="input-box">
                <label>测算类型：</label>
                <select id="nameType">
                    <option value="姓名五格">姓名五格</option>
                    <option value="姓名三才">姓名三才</option>
                    <option value="姓名吉凶">姓名吉凶</option>
                    <option value="姓名寓意">姓名寓意</option>
                </select>
            </div>
            <button class="btn" onclick="analyzeName()">开始测算姓名</button>
            <div id="nameResult"></div>
        </div>

        <!-- 性格分析 -->
        <div id="character" class="tab-content">
            <div class="input-box">
                <label>出生日期：</label>
                <input type="date" id="characterDate" />
            </div>
            <div class="input-box">
                <label>性别：</label>
                <select id="characterGender">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
            <div class="input-box">
                <label>个人特征（选填）：</label>
                <textarea id="characterTraits" placeholder="例如：性格内向、喜欢读书、善于交际等"></textarea>
                <div class="help-text">💡 提供更多信息可以获得更准确的分析</div>
            </div>
            <button class="btn" onclick="analyzeCharacter()">开始分析性格</button>
            <div id="characterResult"></div>
        </div>

        <div class="footer">
            <p>🔮 仅供娱乐参考，请勿过度迷信</p>
            <p style="margin-top: 10px;">Made with ❤️ for Fortune Telling</p>
        </div>
    </div>

    <script>
        const API_KEY = '12b9c331f7b376f873550b5e34aedc4ac43cb763be346e741cd75176aa31aab5';
        const API_BASE = 'https://interialaiapi.xiaojiaixhs.com/v1';

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        async function callAI(messages, temperature = 0.8) {
            try {
                const response = await fetch(`${API_BASE}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages,
                        temperature
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API调用失败 (${response.status}): ${errorText}`);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                if (error.message.includes('Failed to fetch')) {
                    throw new Error('网络连接失败，请检查网络连接');
                }
                throw error;
            }
        }

        async function analyzeBazi() {
            const birthDate = document.getElementById('birthDate').value;
            const birthHour = document.getElementById('birthHour').value;
            const gender = document.getElementById('gender').value;
            const resultDiv = document.getElementById('baziResult');
            
            if (!birthDate) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请选择出生日期</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">AI正在测算八字</div>';

            try {
                const messages = [
                    { role: 'system', content: '你是一位精通八字命理的大师。请根据用户的出生时间，详细分析其八字命盘、五行属性、十神关系、大运流年等，给出专业的命理解读。回答要详细、专业、有说服力。' },
                    { role: 'user', content: `请帮我测算八字：\n出生日期：${birthDate}\n出生时辰：${birthHour}\n性别：${gender}\n\n请详细分析：\n1. 八字命盘（年柱、月柱、日柱、时柱）\n2. 五行属性及强弱\n3. 性格特点\n4. 事业财运\n5. 婚姻感情\n6. 健康状况\n7. 大运流年\n8. 改运建议` }
                ];
                const result = await callAI(messages);
                resultDiv.innerHTML = `<div class="result-box"><strong>📅 八字测算结果：</strong><br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function predictFortune() {
            const birthDate = document.getElementById('fortuneDate').value;
            const fortuneType = document.getElementById('fortuneType').value;
            const resultDiv = document.getElementById('fortuneResult');
            
            if (!birthDate) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请选择出生日期</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">AI正在预测运势</div>';

            try {
                const today = new Date().toLocaleDateString('zh-CN');
                const messages = [
                    { role: 'system', content: '你是一位精通命理运势的大师。请根据用户的出生日期和当前时间，详细预测其运势走向，包括幸运指数、注意事项、开运建议等。' },
                    { role: 'user', content: `请帮我预测${fortuneType}：\n出生日期：${birthDate}\n今天日期：${today}\n\n请详细分析：\n1. 综合运势评分（1-10分）\n2. 幸运色彩和数字\n3. 吉凶方位\n4. 注意事项\n5. 开运建议\n6. 具体运势分析（事业、财运、感情、健康）` }
                ];
                const result = await callAI(messages);
                resultDiv.innerHTML = `<div class="result-box"><strong>🌟 ${fortuneType}预测：</strong><br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function analyzeName() {
            const userName = document.getElementById('userName').value.trim();
            const nameDate = document.getElementById('nameDate').value;
            const nameType = document.getElementById('nameType').value;
            const resultDiv = document.getElementById('nameResult');
            
            if (!userName) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请输入姓名</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">AI正在测算姓名</div>';

            try {
                const messages = [
                    { role: 'system', content: '你是一位精通姓名学的大师。请根据用户的姓名和出生日期，详细分析其姓名五格、三才配置、吉凶评价等，给出专业的姓名学解读。' },
                    { role: 'user', content: `请帮我测算姓名：\n姓名：${userName}\n出生日期：${nameDate || '未提供'}\n测算类型：${nameType}\n\n请详细分析：\n1. 姓名笔画数\n2. 五格数理（天格、人格、地格、外格、总格）\n3. 三才配置（天、人、地）\n4. 吉凶评价\n5. 对性格的影响\n6. 对运势的影响\n7. 改名建议（如有必要）` }
                ];
                const result = await callAI(messages);
                resultDiv.innerHTML = `<div class="result-box"><strong>✍️ ${nameType}结果：</strong><br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }

        async function analyzeCharacter() {
            const characterDate = document.getElementById('characterDate').value;
            const characterGender = document.getElementById('characterGender').value;
            const characterTraits = document.getElementById('characterTraits').value.trim();
            const resultDiv = document.getElementById('characterResult');
            
            if (!characterDate) {
                resultDiv.innerHTML = '<div class="error-box">❌ 请选择出生日期</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">AI正在分析性格</div>';

            try {
                const traitsText = characterTraits ? `\n个人特征：${characterTraits}` : '';
                const messages = [
                    { role: 'system', content: '你是一位精通心理学和命理学的专家。请根据用户的出生日期和个人特征，详细分析其性格特点、优缺点、适合的职业方向等。' },
                    { role: 'user', content: `请帮我分析性格：\n出生日期：${characterDate}\n性别：${characterGender}${traitsText}\n\n请详细分析：\n1. 核心性格特征\n2. 优点和长处\n3. 缺点和需要改进的地方\n4. 适合的职业方向\n5. 人际交往特点\n6. 情感表达方式\n7. 个人成长建议` }
                ];
                const result = await callAI(messages);
                resultDiv.innerHTML = `<div class="result-box"><strong>👤 性格分析结果：</strong><br/><br/>${result}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error-box">❌ ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
